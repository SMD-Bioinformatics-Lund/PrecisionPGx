custom_logo: "PrecisionPGx-light.png"
custom_logo_url: https://github.com/SMD-Bioinformatics-Lund/PrecisionPGx
custom_logo_title: "nf-core/PrecisionPGx"
report_comment: >
  This report has been generated by the <a href="https://github.com/SMD-Bioinformatics-Lund/PrecisionPGx/releases/tag/1.0.0-dev"
  target="_blank">nf-core/PrecisionPGx</a> analysis pipeline. For information about
  how to interpret these results, please see the <a href="https://nf-co.re/raredisease/2.6.0/docs/output"
  target="_blank">documentation</a>.

report_section_order:
  "nf-core-precisionpgx-methods-description":
    order: -1000
  software_versions:
    order: -1001
  "nf-core-precisionpgx-summary":
    order: -1002

export_plots: true

run_modules:
  - fastqc
  - fastp
  - picard
  - mosdepth
  - verifybamid
  - custom_content

module_order:
  - fastqc:
      name: "FastQC"
      path_filters:
        - "*.zip"
  - picard:
      name: "Picard"
  - fastp:
      name: "fastp"
  - mosdepth:
      name: "Mosdepth"
  - verifybamid:
      name: "VerifyBamID2"

extra_fn_clean_exts:
  - "_sorted_md"
  - type: regex
    pattern: "_LNUMBER[0-9]{1,}"

disable_version_detection: true